<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: transparent; display:flex; align-items:center; justify-content:center; width:360px; height:180px; }
  .logo { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .logo-name { font-family:'Montserrat', sans-serif; font-weight:300; font-size:36px; color:#5BA7DD; letter-spacing:0.01em; }
</style>
</head>
<body>
<div class="logo">
  <svg width="80" height="80" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="74" y="20" width="86" height="40" rx="8" fill="#6B5FE8"/>
    <rect x="40" y="32" width="40" height="72" rx="8" fill="#6B5FE8"/>
    <rect x="86" y="80" width="36" height="36" rx="6" fill="#6B5FE8"/>
    <rect x="128" y="92" width="34" height="56" rx="6" fill="#6B5FE8"/>
    <rect x="56" y="140" width="86" height="40" rx="8" fill="#6B5FE8"/>
  </svg>
  <span class="logo-name">systec hub</span>
</div>
</body>
</html>
